version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: infrastructure-postgres
    environment:
      POSTGRES_DB: infrastructure_db
      POSTGRES_USER: infra_user
      POSTGRES_PASSWORD: secure_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infra_user -d infrastructure_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infrastructure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: infrastructure-redis
    command: redis-server --appendonly yes --requirepass redis_dev_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infrastructure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO (S3-compatible object storage for local development)
  minio:
    image: minio/minio:latest
    container_name: infrastructure-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infrastructure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MailHog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: infrastructure-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - infrastructure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Adminer for database management
  adminer:
    image: adminer:latest
    container_name: infrastructure-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - infrastructure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Commander for cache visualization
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: infrastructure-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_dev_password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - infrastructure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  infrastructure-network:
    driver: bridge

# Service URLs for reference:
# PostgreSQL:        localhost:5432 (infra_user / secure_dev_password)
# Redis:             localhost:6379 (password: redis_dev_password)
# MinIO (S3):        localhost:9000 (minioadmin / minioadmin123)
# MinIO Console:     localhost:9001
# MailHog Web:       localhost:8025
# Adminer:           localhost:8080
# Redis Commander:   localhost:8081
